<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para ti ❤️</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffd6e7, #ffeede);
      overflow: hidden;
    }

    .card {
      background: white;
      padding: 40px 30px;
      border-radius: 24px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.12);
      text-align: center;
      width: 90%;
      max-width: 500px;
      position: relative;
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
      color: #333;
    }

    p {
      font-size: 1.2rem;
      color: #555;
      margin-bottom: 30px;
    }

    .buttons {
      position: relative;
      height: 120px;
    }

    button {
      padding: 14px 24px;
      font-size: 1rem;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    #yesBtn {
      background-color: #ff5c8a;
      color: white;
      margin-right: 12px;
    }

    #yesBtn:hover {
      transform: scale(1.05);
    }

    #noBtn {
      background-color: #eaeaea;
      color: #333;
      position: absolute;
    }

    #message {
      margin-top: 25px;
      font-size: 1.3rem;
      color: #ff3f7a;
      font-weight: bold;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Holaaaaa ❤️</h1>
    <p>Quería preguntarte algo importante...</p>
    <p><strong>¿Quieres ir conmigo a una cita a la librería el jueves :3?</strong></p>

    <div class="buttons" id="buttonsArea">
      <button id="yesBtn" onclick="sayYes()">Sí 💖</button>
      <button id="noBtn" onmouseover="moveNoButton()">No 😶</button>
    </div>

    <div id="message">Sabía que dirías que sí 😌❤️</div>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const area = document.getElementById("buttonsArea");

    noBtn.style.left = "260px";
    noBtn.style.top = "0px";

    function moveNoButton() {
      const maxX = area.clientWidth - noBtn.offsetWidth;
      const maxY = area.clientHeight - noBtn.offsetHeight;

      const randomX = Math.random() * maxX;
      const randomY = Math.random() * maxY;

      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";
    }

    function sayYes() {
      document.getElementById("message").style.display = "block";
    }
  </script>
</body>
</html>
